<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FieldOS — Get Started</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ──────────────────────────────────────────── */
:root {
  --bg:         #070b13;
  --surface:    #0c1220;
  --surface2:   #111a2c;
  --border:     rgba(255,255,255,0.07);
  --border-s:   rgba(255,255,255,0.13);
  --gold:       #d4a53a;
  --gold-dim:   rgba(212,165,58,0.12);
  --gold-text:  #f0c96a;
  --gig:        #2dd4bf;
  --mega:       #a78bfa;
  --danger:     #f43f5e;
  --text:       #e8eeff;
  --text2:      #8fa5c9;
  --muted:      #4d6080;
  --r:          14px;
  --r-lg:       20px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* ── BACKGROUND ─────────────────────────────────────── */
.bg-layer{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(212,165,58,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(212,165,58,.025) 1px,transparent 1px);background-size:52px 52px}
.bg-glow{position:absolute;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(212,165,58,.07) 0%,transparent 65%);top:-200px;left:50%;transform:translateX(-50%)}
.bg-glow2{position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(99,102,241,.05) 0%,transparent 65%);bottom:0;right:-100px}

/* ── TOPBAR ─────────────────────────────────────────── */
.topbar{position:fixed;top:0;left:0;right:0;height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;z-index:100;background:rgba(7,11,19,.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);box-shadow:0 1px 0 rgba(212,165,58,.1)}
.logo{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:800;letter-spacing:-.2px}
.logo-mark{width:30px;height:30px;background:linear-gradient(135deg,#b8891e,var(--gold));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#07090f;font-weight:900;box-shadow:0 4px 12px rgba(212,165,58,.3)}
.logo-sub{font-size:10px;font-weight:500;color:var(--muted);letter-spacing:.5px;margin-top:1px;font-family:'IBM Plex Mono',monospace}
.topbar-right{font-size:12px;color:var(--text2)}
.topbar-right a{color:var(--gold-text);text-decoration:none;font-weight:700}
.topbar-right a:hover{text-decoration:underline}

/* ── PAGE WRAPPER ───────────────────────────────────── */
.page{position:relative;z-index:1;width:100%;max-width:640px;padding:96px 20px 60px;display:flex;flex-direction:column;align-items:center;gap:32px}

/* ── PROGRESS ───────────────────────────────────────── */
.progress-wrap{width:100%;display:flex;flex-direction:column;gap:12px}
.progress-bar-track{height:2px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-text));border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.step-labels{display:flex;justify-content:space-between}
.step-label{font-size:9px;font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--muted);letter-spacing:.5px;transition:color .3s}
.step-label.active{color:var(--gold-text)}
.step-label.done{color:var(--gig)}

/* ── STEP CARD ──────────────────────────────────────── */
.step-card{width:100%;background:var(--surface);border:1px solid var(--border-s);border-radius:var(--r-lg);padding:40px;position:relative;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.5)}
.step-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.5}
.step-eyebrow{font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);font-family:'IBM Plex Mono',monospace;margin-bottom:8px}
.step-title{font-size:26px;font-weight:800;letter-spacing:-.4px;margin-bottom:8px}
.step-sub{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:32px}

/* ── FORM ELEMENTS ──────────────────────────────────── */
.field{margin-bottom:18px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-family:'IBM Plex Mono',monospace;margin-bottom:6px}
input,select,textarea{width:100%;background:var(--surface2);border:1px solid var(--border-s);border-radius:10px;padding:12px 15px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s}
input:focus,select:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,165,58,.1)}
input::placeholder,textarea::placeholder{color:var(--muted)}
select option{background:var(--surface2)}

/* ── PLAN CARDS ─────────────────────────────────────── */
.plan-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:8px}
.plan-card{border:1px solid var(--border-s);border-radius:var(--r);padding:20px 16px;cursor:pointer;position:relative;transition:all .22s;background:var(--surface2)}
.plan-card:hover{border-color:rgba(212,165,58,.4);background:var(--surface2)}
.plan-card.selected{border-color:var(--gold);background:rgba(212,165,58,.08);box-shadow:0 0 0 3px rgba(212,165,58,.12)}
.plan-card.featured{border-color:rgba(212,165,58,.35)}
.plan-badge{position:absolute;top:-1px;left:50%;transform:translateX(-50%);background:var(--gold);color:#07090f;font-size:9px;font-weight:800;padding:3px 10px;border-radius:0 0 8px 8px;letter-spacing:.5px;text-transform:uppercase;font-family:'IBM Plex Mono',monospace;white-space:nowrap}
.plan-name{font-size:14px;font-weight:800;margin-bottom:4px}
.plan-price{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:700;color:var(--gold-text);margin-bottom:2px}
.plan-price span{font-size:12px;color:var(--muted);font-weight:400}
.plan-desc{font-size:11px;color:var(--text2);margin-bottom:14px;line-height:1.5}
.plan-features{display:flex;flex-direction:column;gap:5px}
.plan-feat{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:6px}
.plan-feat::before{content:'✓';color:var(--gig);font-weight:700;font-size:11px;flex-shrink:0}
.plan-check{position:absolute;top:12px;right:12px;width:18px;height:18px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:10px;color:#07090f;font-weight:900;opacity:0;transition:opacity .2s}
.plan-card.selected .plan-check{opacity:1}

/* ── SIZE BUTTONS ───────────────────────────────────── */
.size-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px}
.size-btn{border:1px solid var(--border-s);border-radius:10px;padding:12px 8px;text-align:center;cursor:pointer;transition:all .18s;background:var(--surface2);font-size:12px;font-weight:700;color:var(--text2)}
.size-btn:hover{border-color:rgba(212,165,58,.35);color:var(--text)}
.size-btn.sel{border-color:var(--gold);background:var(--gold-dim);color:var(--gold-text)}
.size-num{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:700;display:block;margin-bottom:2px}

/* ── VERTICAL BUTTONS ───────────────────────────────── */
.vert-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px}
.vert-btn{border:1px solid var(--border-s);border-radius:10px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .18s;background:var(--surface2);font-size:12px;font-weight:700;color:var(--text2)}
.vert-btn:hover{border-color:rgba(212,165,58,.35);color:var(--text)}
.vert-btn.sel{border-color:var(--gold);background:var(--gold-dim);color:var(--gold-text)}
.vert-icon{font-size:20px;margin-bottom:6px;display:block}

/* ── TERRITORY TAG STRIP ────────────────────────────── */
.terr-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.terr-tag{background:var(--surface2);border:1px solid var(--border-s);border-radius:20px;padding:5px 12px 5px 10px;display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:var(--text)}
.terr-tag-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);flex-shrink:0}
.terr-tag-rm{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:0 2px;line-height:1;transition:color .15s}
.terr-tag-rm:hover{color:var(--danger)}

/* ── INVITE SECTION ─────────────────────────────────── */
.invite-box{background:var(--surface2);border:1px solid var(--border-s);border-radius:var(--r);padding:18px;margin-bottom:16px}
.invite-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-family:'IBM Plex Mono',monospace;margin-bottom:10px}
.invite-link-row{display:flex;gap:8px;align-items:center}
.invite-link{flex:1;background:var(--bg);border:1px solid var(--border-s);border-radius:8px;padding:10px 13px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-copy{background:var(--gold-dim);border:1px solid rgba(212,165,58,.4);border-radius:8px;color:var(--gold-text);font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:700;padding:9px 14px;cursor:pointer;white-space:nowrap;transition:all .18s}
.btn-copy:hover{background:rgba(212,165,58,.22);border-color:var(--gold)}
.btn-copy.copied{background:rgba(45,212,191,.15);border-color:rgba(45,212,191,.45);color:#5eead4}
.invite-stats{display:flex;gap:16px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.invite-stat{font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace}
.invite-stat strong{color:var(--text);font-weight:700}

/* Email invite row */
.email-add-row{display:flex;gap:8px;margin-bottom:8px}
.email-add-row input{flex:1}
.btn-add-email{background:var(--surface2);border:1px solid var(--border-s);border-radius:8px;color:var(--text2);font-size:13px;font-weight:700;padding:0 14px;cursor:pointer;white-space:nowrap;transition:all .18s;font-family:'Plus Jakarta Sans',sans-serif}
.btn-add-email:hover{border-color:var(--gold);color:var(--gold-text)}
.email-list{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.email-row{display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--text2)}
.email-rm{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;transition:color .15s}
.email-rm:hover{color:var(--danger)}

/* ── LAUNCH SCREEN ──────────────────────────────────── */
.launch-center{text-align:center;padding:16px 0 8px}
.launch-icon{font-size:64px;margin-bottom:20px;display:block;animation:launch-pop .6s cubic-bezier(.175,.885,.32,1.275)}
@keyframes launch-pop{from{transform:scale(0) rotate(-20deg);opacity:0}to{transform:scale(1) rotate(0deg);opacity:1}}
.launch-title{font-size:30px;font-weight:800;letter-spacing:-.5px;margin-bottom:8px}
.launch-sub{font-size:14px;color:var(--text2);line-height:1.6;max-width:440px;margin:0 auto 28px}
.workspace-id-box{background:var(--surface2);border:1px solid rgba(212,165,58,.3);border-radius:var(--r);padding:16px 20px;margin-bottom:28px;display:inline-flex;align-items:center;gap:14px}
.ws-id-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-family:'IBM Plex Mono',monospace}
.ws-id-val{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;color:var(--gold-text)}
.launch-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:32px}
.lstat{background:var(--surface2);border:1px solid var(--border-s);border-radius:var(--r);padding:16px;text-align:center}
.lstat-val{font-size:22px;font-weight:800;font-family:'IBM Plex Mono',monospace;color:var(--text)}
.lstat-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px;font-family:'IBM Plex Mono',monospace}

/* ── BUTTONS ────────────────────────────────────────── */
.btn-next{width:100%;padding:15px;background:linear-gradient(135deg,#b8891e,var(--gold));color:#07090f;border:none;border-radius:12px;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:800;cursor:pointer;transition:all .25s;box-shadow:0 4px 20px rgba(212,165,58,.3);letter-spacing:.1px;margin-top:8px}
.btn-next:hover{filter:brightness(1.08);transform:translateY(-1px);box-shadow:0 8px 28px rgba(212,165,58,.45)}
.btn-next:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}
.btn-back{background:none;border:none;color:var(--text2);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;padding:10px;margin-top:4px;transition:color .15s;display:flex;align-items:center;gap:5px}
.btn-back:hover{color:var(--text)}
.btn-launch-go{width:100%;padding:16px;background:linear-gradient(135deg,#0d9488,#0f766e);color:#fff;border:none;border-radius:12px;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:800;cursor:pointer;transition:all .25s;box-shadow:0 4px 20px rgba(13,148,136,.3);letter-spacing:.1px}
.btn-launch-go:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 8px 28px rgba(13,148,136,.45)}
.btn-actions{display:flex;flex-direction:column;gap:8px;margin-top:8px}

/* ── HINT / NOTE ────────────────────────────────────── */
.hint{font-size:11px;color:var(--muted);line-height:1.5;margin-top:8px}
.note-box{background:var(--gold-dim);border:1px solid rgba(212,165,58,.25);border-radius:10px;padding:10px 13px;font-size:11px;color:var(--text2);line-height:1.6;margin-bottom:18px}

/* ── STEP TRANSITIONS ───────────────────────────────── */
.step-card{animation:step-in .35s cubic-bezier(.4,0,.2,1)}
@keyframes step-in{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* ── SECURITY BADGES ────────────────────────────────── */
.trust-row{display:flex;align-items:center;justify-content:center;gap:20px;flex-wrap:wrap;margin-top:4px}
.trust-badge{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
.trust-badge span{font-size:14px}

/* ── LOADING SPINNER ────────────────────────────────── */
.spinner{width:18px;height:18px;border:2px solid rgba(7,9,15,.3);border-top-color:#07090f;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── RESPONSIVE ─────────────────────────────────────── */
@media(max-width:580px){
  .plan-grid{grid-template-columns:1fr}
  .field-row{grid-template-columns:1fr}
  .size-grid{grid-template-columns:repeat(2,1fr)}
  .vert-grid{grid-template-columns:repeat(2,1fr)}
  .step-card{padding:26px 18px}
  .step-title{font-size:22px}
  .launch-stats{grid-template-columns:repeat(3,1fr)}
  .page{padding:80px 16px 40px}
  .step-label{font-size:8px}
}
</style>
</head>
<body>

<div class="bg-layer">
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div class="bg-glow2"></div>
</div>

<nav class="topbar">
  <div class="logo">
    <div class="logo-mark">F</div>
    <div>
      <div>FieldOS</div>
      <div class="logo-sub">ENTERPRISE FIELD SALES</div>
    </div>
  </div>
  <div class="topbar-right">Already have an account? <a href="#">Sign in →</a></div>
</nav>

<div class="page">

  <!-- PROGRESS -->
  <div class="progress-wrap">
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progress-fill" style="width:16.6%"></div>
    </div>
    <div class="step-labels">
      <span class="step-label active" id="lbl-0">Company</span>
      <span class="step-label" id="lbl-1">Account</span>
      <span class="step-label" id="lbl-2">Plan</span>
      <span class="step-label" id="lbl-3">Territory</span>
      <span class="step-label" id="lbl-4">Invite</span>
      <span class="step-label" id="lbl-5">Launch</span>
    </div>
  </div>

  <!-- CARD CONTAINER -->
  <div id="step-container" style="width:100%"></div>

  <!-- TRUST ROW -->
  <div class="trust-row">
    <div class="trust-badge"><span>🔒</span> SOC 2 Ready</div>
    <div class="trust-badge"><span>🛡️</span> Data Encrypted</div>
    <div class="trust-badge"><span>📋</span> GDPR Compliant</div>
    <div class="trust-badge"><span>⚡</span> 99.9% Uptime SLA</div>
  </div>

</div>

<script>
// ── STATE ────────────────────────────────────────────
const state = {
  step: 0,
  company: '', vertical: '', size: '',
  adminName: '', adminEmail: '', adminPhone: '', adminRole: '',
  plan: 'growth',
  territories: [],
  inviteEmails: [],
  workspaceId: '',
  inviteToken: ''
};

const STEPS = ['Company','Account','Plan','Territory','Invite','Launch'];
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxA3zZbBUGYBGxrZd5VqGfjIMor-uoV8YkkH2v9_QXrgVzIFHeiB2Fb11ZKi6g8jCJt/exec'; // replace after deploying multitenant.gs

// ── RENDER ───────────────────────────────────────────
function render() {
  const c = document.getElementById('step-container');
  c.innerHTML = '';

  const pct = ((state.step + 1) / STEPS.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  STEPS.forEach((_, i) => {
    const el = document.getElementById('lbl-' + i);
    el.className = 'step-label' +
      (i === state.step ? ' active' : '') +
      (i < state.step ? ' done' : '');
  });

  const fns = [renderStep0, renderStep1, renderStep2, renderStep3, renderStep4, renderStep5];
  c.appendChild(fns[state.step]());
}

// ── STEP 0: COMPANY ──────────────────────────────────
function renderStep0() {
  const d = div('step-card');
  d.innerHTML = `
    <div class="step-eyebrow">Step 1 of 6</div>
    <h1 class="step-title">Tell us about your company</h1>
    <p class="step-sub">We'll configure FieldOS specifically for your industry and team size.</p>

    <div class="field">
      <label>Company Name</label>
      <input type="text" id="company" placeholder="Acme Telecom" value="${state.company}" autofocus>
    </div>

    <label>Industry Vertical</label>
    <div class="vert-grid" id="vert-grid">
      ${[['📡','Telecom / ISP'],['🔌','Utilities'],['📺','Cable / Fiber'],['🏠','Home Services'],['💧','Water / Gas'],['⚡','Energy']].map(([ic,lb]) =>
        `<div class="vert-btn${state.vertical===lb?' sel':''}" data-v="${lb}"><span class="vert-icon">${ic}</span>${lb}</div>`
      ).join('')}
    </div>

    <label>Team Size</label>
    <div class="size-grid">
      ${[['1–5','Solo'],['6–15','Small'],['16–50','Mid'],['50+','Large']].map(([n,l]) =>
        `<div class="size-btn${state.size===n?' sel':''}" data-s="${n}"><span class="size-num">${n}</span>${l}</div>`
      ).join('')}
    </div>

    <button class="btn-next" id="btn-next-0">Continue →</button>
  `;

  d.querySelectorAll('.vert-btn').forEach(b => b.addEventListener('click', () => {
    state.vertical = b.dataset.v;
    d.querySelectorAll('.vert-btn').forEach(x => x.classList.remove('sel'));
    b.classList.add('sel');
  }));
  d.querySelectorAll('.size-btn').forEach(b => b.addEventListener('click', () => {
    state.size = b.dataset.s;
    d.querySelectorAll('.size-btn').forEach(x => x.classList.remove('sel'));
    b.classList.add('sel');
  }));
  d.querySelector('#btn-next-0').addEventListener('click', () => {
    state.company = d.querySelector('#company').value.trim();
    if (!state.company) { shake(d.querySelector('#company')); return; }
    if (!state.vertical) { alert('Please select your industry vertical.'); return; }
    if (!state.size) { alert('Please select your team size.'); return; }
    next();
  });
  return d;
}

// ── STEP 1: ACCOUNT ──────────────────────────────────
function renderStep1() {
  const d = div('step-card');
  d.innerHTML = `
    <div class="step-eyebrow">Step 2 of 6</div>
    <h1 class="step-title">Your admin account</h1>
    <p class="step-sub">This becomes the master account for your workspace. You'll be able to add your team in a moment.</p>

    <div class="field-row">
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="adminName" placeholder="Jordan Smith" value="${state.adminName}">
      </div>
      <div class="field">
        <label>Your Role</label>
        <select id="adminRole">
          ${['Owner','VP of Sales','Sales Manager','Operations Manager','Other'].map(r =>
            `<option value="${r}"${state.adminRole===r?' selected':''}>${r}</option>`
          ).join('')}
        </select>
      </div>
    </div>

    <div class="field">
      <label>Work Email</label>
      <input type="email" id="adminEmail" placeholder="jordan@acmetelecom.com" value="${state.adminEmail}">
    </div>

    <div class="field">
      <label>Phone <span style="color:var(--muted);font-size:9px;font-weight:400">OPTIONAL</span></label>
      <input type="tel" id="adminPhone" placeholder="+1 (555) 000-0000" value="${state.adminPhone}">
    </div>

    <div class="note-box">🔐 Your workspace will be isolated — no other company can access your data. We never sell or share your information.</div>

    <button class="btn-next" id="btn-next-1">Continue →</button>
    <button class="btn-back" onclick="back()">← Back</button>
  `;
  d.querySelector('#btn-next-1').addEventListener('click', () => {
    state.adminName  = d.querySelector('#adminName').value.trim();
    state.adminEmail = d.querySelector('#adminEmail').value.trim();
    state.adminPhone = d.querySelector('#adminPhone').value.trim();
    state.adminRole  = d.querySelector('#adminRole').value;
    if (!state.adminName)  { shake(d.querySelector('#adminName')); return; }
    if (!state.adminEmail || !state.adminEmail.includes('@')) { shake(d.querySelector('#adminEmail')); return; }
    next();
  });
  return d;
}

// ── STEP 2: PLAN ─────────────────────────────────────
function renderStep2() {
  const d = div('step-card');
  const plans = [
    { id:'starter', name:'Starter', price:'$49', per:'/mo', desc:'Perfect for small teams getting started with field sales tracking.', feats:['1 territory','Up to 5 reps','Map + dispositions','Basic reporting','Email support'] },
    { id:'growth',  name:'Growth',  price:'$149', per:'/mo', desc:'Full analytics, AI insights, and multi-territory management.', feats:['Unlimited territories','Up to 25 reps','AI analysis tab','Manager dashboard','Schedule booking','Priority support'], badge:'Most Popular' },
    { id:'enterprise', name:'Enterprise', price:'Custom', per:'', desc:'White-label, SSO, CRM integration, and dedicated success manager.', feats:['Unlimited everything','SSO / SAML','CRM integration','White-label branding','Custom territories','Dedicated CSM'] },
  ];
  d.innerHTML = `
    <div class="step-eyebrow">Step 3 of 6</div>
    <h1 class="step-title">Choose your plan</h1>
    <p class="step-sub">All plans include a 14-day free trial. No credit card required to start.</p>
    <div class="plan-grid">
      ${plans.map(p => `
        <div class="plan-card${state.plan===p.id?' selected':''}${p.badge?' featured':''}" data-plan="${p.id}">
          ${p.badge?`<div class="plan-badge">${p.badge}</div>`:''}
          <div class="plan-check">✓</div>
          <div class="plan-name">${p.name}</div>
          <div class="plan-price">${p.price}<span>${p.per}</span></div>
          <div class="plan-desc">${p.desc}</div>
          <div class="plan-features">${p.feats.map(f=>`<div class="plan-feat">${f}</div>`).join('')}</div>
        </div>
      `).join('')}
    </div>
    <p class="hint">Enterprise pricing starts at $299/mo. Contact us after setup for a custom quote.</p>
    <button class="btn-next" id="btn-next-2">Continue with ${state.plan.charAt(0).toUpperCase()+state.plan.slice(1)} →</button>
    <button class="btn-back" onclick="back()">← Back</button>
  `;
  d.querySelectorAll('.plan-card').forEach(c => c.addEventListener('click', () => {
    state.plan = c.dataset.plan;
    d.querySelectorAll('.plan-card').forEach(x => x.classList.remove('selected'));
    c.classList.add('selected');
    d.querySelector('#btn-next-2').textContent = `Continue with ${state.plan.charAt(0).toUpperCase()+state.plan.slice(1)} →`;
  }));
  d.querySelector('#btn-next-2').addEventListener('click', next);
  return d;
}

// ── STEP 3: TERRITORY ────────────────────────────────
function renderStep3() {
  const d = div('step-card');
  d.innerHTML = `
    <div class="step-eyebrow">Step 4 of 6</div>
    <h1 class="step-title">Set up your territories</h1>
    <p class="step-sub">Territories organize your reps and track performance by region. You can always add more later.</p>

    <div class="terr-tags" id="terr-tags">
      ${state.territories.map(t => `
        <div class="terr-tag" data-t="${t}">
          <div class="terr-tag-dot"></div>${t}
          <button class="terr-tag-rm" data-rm="${t}">×</button>
        </div>
      `).join('')}
    </div>

    <div class="field-row">
      <div class="field" style="margin-bottom:0">
        <label>Territory Name</label>
        <input type="text" id="terr-name" placeholder="e.g. Palestine, TX">
      </div>
      <div class="field" style="margin-bottom:0">
        <label>Region / State</label>
        <input type="text" id="terr-region" placeholder="e.g. East Texas">
      </div>
    </div>
    <button class="btn-add-email" id="btn-add-terr" style="margin-top:10px;width:100%;padding:12px">+ Add Territory</button>

    <div class="note-box" style="margin-top:18px;margin-bottom:0">📍 Reps are assigned to territories. Each territory gets its own address list, schedule, and analytics. KML map upload is available after setup.</div>

    <button class="btn-next" id="btn-next-3" style="margin-top:24px">${state.territories.length ? 'Continue →' : 'Skip for now →'}</button>
    <button class="btn-back" onclick="back()">← Back</button>
  `;

  function refreshTags() {
    const ct = d.querySelector('#terr-tags');
    ct.innerHTML = state.territories.map(t => `
      <div class="terr-tag" data-t="${t}">
        <div class="terr-tag-dot"></div>${t}
        <button class="terr-tag-rm" data-rm="${t}">×</button>
      </div>
    `).join('');
    ct.querySelectorAll('.terr-tag-rm').forEach(b => b.addEventListener('click', () => {
      state.territories = state.territories.filter(x => x !== b.dataset.rm);
      refreshTags();
      d.querySelector('#btn-next-3').textContent = state.territories.length ? 'Continue →' : 'Skip for now →';
    }));
  }
  refreshTags();

  d.querySelector('#btn-add-terr').addEventListener('click', () => {
    const n = d.querySelector('#terr-name').value.trim();
    if (!n) { shake(d.querySelector('#terr-name')); return; }
    if (!state.territories.includes(n)) state.territories.push(n);
    d.querySelector('#terr-name').value = '';
    d.querySelector('#terr-region').value = '';
    refreshTags();
    d.querySelector('#btn-next-3').textContent = 'Continue →';
  });
  d.querySelector('#btn-next-3').addEventListener('click', next);
  return d;
}

// ── STEP 4: INVITE ───────────────────────────────────
function renderStep4() {
  const wsSlug = slugify(state.company);
  const token  = genToken();
  state.inviteToken = token;
  state.workspaceId = wsSlug + '-' + token.slice(0,6);
  const link = `${window.location.origin}/invite.html?ws=${state.workspaceId}&token=${token}`;

  const d = div('step-card');
  d.innerHTML = `
    <div class="step-eyebrow">Step 5 of 6</div>
    <h1 class="step-title">Invite your reps</h1>
    <p class="step-sub">Share your unique invite link or send emails directly. Reps get their own onboarding flow to set up their profile.</p>

    <div class="invite-box">
      <div class="invite-label">Your Workspace Invite Link</div>
      <div class="invite-link-row">
        <div class="invite-link" id="invite-link-display">${link}</div>
        <button class="btn-copy" id="btn-copy-link">Copy Link</button>
      </div>
      <div class="invite-stats">
        <div class="invite-stat">Workspace: <strong>${state.workspaceId}</strong></div>
        <div class="invite-stat">Seats: <strong>${state.plan==='starter'?'5':state.plan==='growth'?'25':'∞'}</strong></div>
        <div class="invite-stat">Expires: <strong>Never</strong></div>
      </div>
    </div>

    <label>Or send email invites directly</label>
    <div class="email-add-row">
      <input type="email" id="invite-email-input" placeholder="rep@company.com">
      <button class="btn-add-email" id="btn-add-inv-email">+ Add</button>
    </div>
    <div class="email-list" id="email-list">
      ${state.inviteEmails.map(e => `
        <div class="email-row">${e}<button class="email-rm" data-e="${e}">×</button></div>
      `).join('')}
    </div>

    <p class="hint" style="margin-top:16px">You can skip this step and invite reps from your admin dashboard after setup.</p>

    <button class="btn-next" id="btn-next-4" style="margin-top:24px">Create My Workspace →</button>
    <button class="btn-back" onclick="back()">← Back</button>
  `;

  d.querySelector('#btn-copy-link').addEventListener('click', function() {
    navigator.clipboard.writeText(link).then(() => {
      this.textContent = '✓ Copied!';
      this.classList.add('copied');
      setTimeout(() => { this.textContent = 'Copy Link'; this.classList.remove('copied'); }, 2500);
    });
  });

  function refreshEmails() {
    const el = d.querySelector('#email-list');
    el.innerHTML = state.inviteEmails.map(e =>
      `<div class="email-row">${e}<button class="email-rm" data-e="${e}">×</button></div>`
    ).join('');
    el.querySelectorAll('.email-rm').forEach(b => b.addEventListener('click', () => {
      state.inviteEmails = state.inviteEmails.filter(x => x !== b.dataset.e);
      refreshEmails();
    }));
  }
  refreshEmails();

  d.querySelector('#btn-add-inv-email').addEventListener('click', () => {
    const v = d.querySelector('#invite-email-input').value.trim();
    if (v && v.includes('@') && !state.inviteEmails.includes(v)) {
      state.inviteEmails.push(v);
      d.querySelector('#invite-email-input').value = '';
      refreshEmails();
    }
  });

  d.querySelector('#btn-next-4').addEventListener('click', async () => {
    const btn = d.querySelector('#btn-next-4');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Creating workspace…';
    await createWorkspace();
    next();
  });
  return d;
}

// ── STEP 5: LAUNCH ───────────────────────────────────
function renderStep5() {
  const d = div('step-card');
  d.innerHTML = `
    <div class="launch-center">
      <span class="launch-icon">🚀</span>
      <h1 class="launch-title">You're all set, ${state.adminName.split(' ')[0]}!</h1>
      <p class="launch-sub">Your <strong>${state.company}</strong> workspace is live. Your reps can start knocking doors today.</p>

      <div class="workspace-id-box">
        <div>
          <div class="ws-id-label">Workspace ID</div>
          <div class="ws-id-val">${state.workspaceId}</div>
        </div>
        <div style="width:1px;height:36px;background:var(--border)"></div>
        <div>
          <div class="ws-id-label">Plan</div>
          <div class="ws-id-val">${state.plan.charAt(0).toUpperCase()+state.plan.slice(1)}</div>
        </div>
        <div style="width:1px;height:36px;background:var(--border)"></div>
        <div>
          <div class="ws-id-label">Trial Ends</div>
          <div class="ws-id-val">${trialEnd()}</div>
        </div>
      </div>

      <div class="launch-stats">
        <div class="lstat">
          <div class="lstat-val">${state.territories.length || 0}</div>
          <div class="lstat-lbl">Territories</div>
        </div>
        <div class="lstat">
          <div class="lstat-val">${state.inviteEmails.length}</div>
          <div class="lstat-lbl">Invites Sent</div>
        </div>
        <div class="lstat">
          <div class="lstat-val">14</div>
          <div class="lstat-lbl">Days Free</div>
        </div>
      </div>

      <div class="btn-actions">
        <button class="btn-launch-go" onclick="goToAdmin()">Open Admin Dashboard →</button>
        <button class="btn-next" style="background:linear-gradient(135deg,#6d28d9,#7c3aed);box-shadow:0 4px 20px rgba(109,40,217,.3)" onclick="goToApp()">Launch Field App →</button>
      </div>

      <p class="hint" style="margin-top:16px;text-align:center">A setup email has been sent to <strong>${state.adminEmail}</strong></p>
    </div>
  `;
  return d;
}

// ── HELPERS ──────────────────────────────────────────
function div(cls) { const d = document.createElement('div'); if(cls) d.className=cls; return d; }
function next() { state.step = Math.min(state.step+1, STEPS.length-1); render(); window.scrollTo({top:0,behavior:'smooth'}); }
function back() { state.step = Math.max(state.step-1, 0); render(); window.scrollTo({top:0,behavior:'smooth'}); }
function slugify(s) { return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''); }
function genToken() { return Math.random().toString(36).slice(2,10) + Math.random().toString(36).slice(2,10); }
function trialEnd() {
  const d = new Date(); d.setDate(d.getDate()+14);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function shake(el) {
  el.style.borderColor='var(--danger)';
  el.focus();
  el.animate([{transform:'translateX(-6px)'},{transform:'translateX(6px)'},{transform:'translateX(-4px)'},{transform:'translateX(4px)'},{transform:'translateX(0)'}],{duration:350});
  setTimeout(()=>el.style.borderColor='',1500);
}

function goToAdmin() {
  window.location.href = `admin.html?ws=${state.workspaceId}`;
}
function goToApp() {
  window.location.href = `index.html?ws=${state.workspaceId}&rep=${encodeURIComponent(state.adminName)}&role=admin`;
}

// ── BOOT ─────────────────────────────────────────────
render();
</script>
